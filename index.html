<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Wedding Invitation - Fuzail & Riya</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f7f5f0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card-container {
            position: relative;
            max-width: 450px; 
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1.414; 
            background-color: #ffffff;
            /* Pointing directly to your uploaded image file */
            background-image: url('Gemini_Generated_Image_46fwfu46fwfu46fw (1).png');
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid #e6e2da;
        }

        .overlay-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 20% auto 12% 15% 15%; 
            z-index: 10;
            pointer-events: none; 
        }

        .map-link-overlay {
            grid-row: 5; 
            display: flex;
            justify-content: space-around;
            align-items: center;
            pointer-events: auto; 
            padding: 0 20px;
        }

        .map-btn {
            display: block;
            background: rgba(140, 130, 117, 0.0); 
            width: 45%;
            height: 70%;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            text-indent: -9999px; 
        }

        /* Subtle indicator when a user taps/hovers over the location area */
        .map-btn:hover {
            background: rgba(140, 130, 117, 0.15); 
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="overlay-content">
            <div class="header-space"></div>
            <div class="names-space"></div>
            <div class="details-space"></div>
            
            <!-- Map Links Overlay (Positioned exactly over the bottom venue details) -->
            <div class="map-link-overlay">
                <!-- Left side maps to Nikah Venue -->
                <a href="https://maps.google.com?q=MUHIYUDHEEN+MASJID+Kannur" target="_blank" class="map-btn" title="View Masjid Map">
                    Masjid Map
                </a>
                <!-- Right side maps to Reception Venue -->
                <a href="https://maps.google.com?q=EXORA+CONVENTIONS+Talap+Kannur" target="_blank" class="map-btn" title="View Exora Map">
                    Exora Map
                </a>
            </div>
        </div>
    </div>

</body>
</html>
